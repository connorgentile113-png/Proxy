<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proxy</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #222;
      --accent: #e8ff3b;
      --accent2: #3bffd8;
      --text: #f0f0f0;
      --muted: #555;
      --danger: #ff4f4f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    header {
      position: relative;
      z-index: 10;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      color: var(--accent);
      white-space: nowrap;
    }

    .logo span {
      color: var(--accent2);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .url-bar-wrap {
      flex: 1;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    #url-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      padding: 0.6rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #url-input:focus {
      border-color: var(--accent);
    }

    #url-input::placeholder {
      color: var(--muted);
    }

    #go-btn {
      background: var(--accent);
      color: #000;
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 0.6rem 1.4rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    #go-btn:hover { background: #fff; }
    #go-btn:active { transform: scale(0.97); }

    .quick-links {
      position: relative;
      z-index: 10;
      padding: 0.6rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      background: rgba(10,10,10,0.7);
    }

    .quick-link {
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      padding: 0.2rem 0.6rem;
      border: 1px solid transparent;
      transition: all 0.15s;
      text-decoration: none;
      font-family: 'Space Mono', monospace;
    }

    .quick-link:hover {
      color: var(--accent2);
      border-color: var(--accent2);
    }

    .main {
      flex: 1;
      position: relative;
      z-index: 1;
    }

    #proxy-frame {
      width: 100%;
      height: calc(100vh - 112px);
      border: none;
      display: none;
      background: white;
    }

    .home-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 112px);
      gap: 2rem;
      padding: 2rem;
      text-align: center;
    }

    .hero-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -0.04em;
    }

    .hero-title .line1 { color: var(--text); }
    .hero-title .line2 { color: var(--accent); }

    .hero-sub {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .loading-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      background: var(--accent);
      width: 0%;
      z-index: 999;
      transition: width 0.3s;
      box-shadow: 0 0 10px var(--accent);
    }

    .error-msg {
      display: none;
      color: var(--danger);
      font-size: 0.75rem;
      padding: 0.4rem 2rem;
      background: rgba(255,79,79,0.1);
      border-bottom: 1px solid rgba(255,79,79,0.2);
    }
  </style>
</head>
<body>

<div class="grid-bg"></div>
<div class="loading-bar" id="loading-bar"></div>

<header>
  <div class="logo">void<span>proxy</span></div>
  <div class="status-dot"></div>
  <div class="url-bar-wrap">
    <input id="url-input" type="text" placeholder="https://wikipedia.org" autocomplete="off" spellcheck="false" />
    <button id="go-btn">GO →</button>
  </div>
</header>

<div class="quick-links">
  <span style="font-size:0.7rem;color:var(--muted);align-self:center;margin-right:0.3rem">QUICK:</span>
  <a class="quick-link" onclick="navigate('https://wikipedia.org')">Wikipedia</a>
  <a class="quick-link" onclick="navigate('https://duckduckgo.com')">DuckDuckGo</a>
  <a class="quick-link" onclick="navigate('https://news.ycombinator.com')">Hacker News</a>
  <a class="quick-link" onclick="navigate('https://reddit.com')">Reddit</a>
  <a class="quick-link" onclick="navigate('https://github.com')">GitHub</a>
  <a class="quick-link" onclick="navigate('https://archive.org')">Archive.org</a>
</div>

<div class="error-msg" id="error-msg"></div>

<div class="main">
  <div class="home-screen" id="home-screen">
    <div class="hero-title">
      <div class="line1">BROWSE</div>
      <div class="line2">FREELY.</div>
    </div>
    <div class="hero-sub">Enter a URL above to get started</div>
  </div>
  <iframe id="proxy-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

<script>
  const input = document.getElementById('url-input');
  const btn = document.getElementById('go-btn');
  const frame = document.getElementById('proxy-frame');
  const home = document.getElementById('home-screen');
  const bar = document.getElementById('loading-bar');
  const errMsg = document.getElementById('error-msg');

  function navigate(url) {
    if (!url) url = input.value.trim();
    if (!url) return;
    if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;

    input.value = url;
    errMsg.style.display = 'none';

    // Loading bar animation
    bar.style.width = '30%';
    setTimeout(() => bar.style.width = '70%', 300);

    home.style.display = 'none';
    frame.style.display = 'block';
    frame.src = '/proxy?url=' + encodeURIComponent(url);

    frame.onload = () => {
      bar.style.width = '100%';
      setTimeout(() => { bar.style.width = '0%'; }, 400);
    };

    frame.onerror = () => {
      bar.style.width = '0%';
      errMsg.textContent = 'Failed to load: ' + url;
      errMsg.style.display = 'block';
    };
  }

  btn.addEventListener('click', () => navigate(input.value));
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') navigate(input.value); });
</script>
</body>
</html>
